<svg viewBox="0 0 1544 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Edit Post Link banner">
  <defs>
    <clipPath id="cursor-banner">
      <path d="M 0,0 L 0,160 L 36,124 L 62,176 L 86,164 L 60,112 L 112,112 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="#2271B1"/>

  <!-- Cursor-pencil mark (scaled, left-positioned) -->
  <g transform="translate(140, 48) scale(2.3)">
    <g clip-path="url(#cursor-banner)">
      <rect width="120" height="180" fill="#FDB913"/>
      <rect y="0"   width="120" height="32"  fill="#1F2937"/>
      <rect y="32"  width="120" height="14"  fill="#E0B589"/>
      <rect y="108" width="120" height="10"  fill="#C0C5CC"/>
      <rect y="118" width="120" height="62"  fill="#F472B6"/>
    </g>
    <path d="M 0,0 L 0,160 L 36,124 L 62,176 L 86,164 L 60,112 L 112,112 Z"
          fill="none" stroke="#0F172A" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="500" y="248"
        fill="#FFFFFF"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif"
        font-size="124"
        font-weight="700"
        letter-spacing="-2">Edit Post Link</text>

  <!-- Tagline -->
  <text x="504" y="328"
        fill="#FFFFFF"
        fill-opacity="0.82"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif"
        font-size="42"
        font-weight="400">One-click editing, right from the front-end.</text>
</svg>
